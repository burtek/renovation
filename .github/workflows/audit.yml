name: Dependency Audit

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: yarn audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run yarn audit
        id: audit
        shell: bash
        run: |
          yarn audit 2>&1 | tee /tmp/audit-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const fullReport = fs.readFileSync('/tmp/audit-report.txt', 'utf8');
            const lines = fullReport.split('\n');
            const totalLines = lines.length;
            const truncatedReport = lines.slice(0, 50).join('\n');
            const now = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const titlePrefix = 'Security vulnerabilities found by yarn audit';
            const summaryLine = lines.slice().reverse().find((l) => /vulnerabilities found/i.test(l)) ?? '';
            const truncationNote = totalLines > 50
              ? [
                  summaryLine ? `_${summaryLine}_` : '',
                  `_Showing first 50 of ${totalLines} lines. [View full audit output in workflow run](${runUrl})._`,
                ].filter(Boolean).join('\n')
              : `[View full audit output in workflow run](${runUrl})`;

            const formatBody = (header) => [
              header,
              '',
              '```',
              truncatedReport,
              '```',
              '',
              truncationNote,
            ].join('\n');

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existingIssue = openIssues.find((issue) =>
              !issue.pull_request && issue.title.startsWith(titlePrefix)
            );

            if (existingIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: formatBody(`A scheduled yarn audit run on ${now} detected vulnerabilities again.`),
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `${titlePrefix} (${now})`,
                body: formatBody('## yarn audit report\n\nVulnerabilities were detected during the scheduled dependency audit.'),
                assignees: ['Copilot'],
              });
            }
