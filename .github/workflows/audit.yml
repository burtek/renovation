name: Dependency Audit

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: yarn audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run yarn audit
        id: audit
        run: |
          yarn audit 2>&1 | tee /tmp/audit-report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: steps.audit.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/audit-report.txt', 'utf8');
            const now = new Date().toISOString().slice(0, 10);

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security vulnerabilities found by yarn audit (${now})`,
              body: [
                '## yarn audit report',
                '',
                'Vulnerabilities were detected during the scheduled dependency audit.',
                '',
                '```',
                report,
                '```',
              ].join('\n'),
              assignees: ['Copilot'],
            });
