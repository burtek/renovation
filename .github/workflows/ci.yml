name: CI

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test:coverage --reporter=verbose --coverage.reporter=text --coverage.reporter=json-summary

      - name: Post coverage comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const summaryPath = path.join(process.env.GITHUB_WORKSPACE, 'coverage', 'coverage-summary.json');
            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const total = summary.total;

            const pct = (key) => {
              const d = total[key];
              const p = d.pct;
              const icon = p >= 90 ? '🟢' : p >= 70 ? '🟡' : '🔴';
              return `${icon} ${p}% (${d.covered}/${d.total})`;
            };

            const body = [
              '## 🧪 Test Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Statements | ${pct('statements')} |`,
              `| Branches   | ${pct('branches')} |`,
              `| Functions  | ${pct('functions')} |`,
              `| Lines      | ${pct('lines')} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 Test Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
