name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test:coverage --reporter=verbose --coverage.reporter=text --coverage.reporter=json-summary

      - name: Get base branch coverage
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          git worktree add /tmp/base-worktree origin/${{ github.base_ref }}
          cd /tmp/base-worktree
          yarn install --frozen-lockfile --silent
          yarn test:coverage --coverage.reporter=json-summary || true

      - name: Post coverage comment
        if: always() && github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const currentPath = path.join(process.env.GITHUB_WORKSPACE, 'coverage', 'coverage-summary.json');
            if (!fs.existsSync(currentPath)) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }

            const current = JSON.parse(fs.readFileSync(currentPath, 'utf8'));
            const basePath = '/tmp/base-worktree/coverage/coverage-summary.json';
            const base = fs.existsSync(basePath) ? JSON.parse(fs.readFileSync(basePath, 'utf8')) : null;

            const icon = p => p >= 90 ? '🟢' : p >= 70 ? '🟡' : '🔴';
            const fmtPct = (d) => `${icon(d.pct)} ${d.pct.toFixed(1)}%`;
            const delta = (cur, bas) => {
              if (!bas) return '';
              const d = cur.pct - bas.pct;
              if (Math.abs(d) < 0.05) return '±0.0%';
              return (d > 0 ? '+' : '') + d.toFixed(1) + '%';
            };

            const row = (label, key) => {
              const c = current.total[key];
              const b = base ? base.total[key] : null;
              const basCol = b ? ` ${fmtPct(b)} |` : '';
              const deltaCol = b ? ` ${delta(c, b)} |` : '';
              return `| ${label} |${basCol} ${fmtPct(c)} |${deltaCol} ${c.covered}/${c.total} |`;
            };

            const headerBase = base ? ' Base |' : '';
            const sepBase = base ? '-------|' : '';
            const headerDelta = base ? ' Δ |' : '';
            const sepDelta = base ? '----|' : '';

            const lines = [
              '## 🧪 Test Coverage Report',
              '',
              `| Metric |${headerBase} Current |${headerDelta} Covered |`,
              `|--------|${sepBase}---------|${sepDelta}---------|`,
              row('Statements', 'statements'),
              row('Branches', 'branches'),
              row('Functions', 'functions'),
              row('Lines', 'lines'),
            ];

            if (!base) {
              lines.push('', '_ℹ️ Base branch coverage not available — no comparison data could be generated for `${{ github.base_ref }}`._');
            }

            // Files with incomplete coverage
            const incomplete = Object.entries(current)
              .filter(([file]) => file !== 'total')
              .map(([file, data]) => ({
                file: file.replace(process.env.GITHUB_WORKSPACE + '/', ''),
                ...data,
              }))
              .filter(f => f.statements.pct < 100 || f.branches.pct < 100 || f.functions.pct < 100 || f.lines.pct < 100)
              .sort((a, b) => a.statements.pct - b.statements.pct);

            if (incomplete.length > 0) {
              lines.push('', '### 📋 Files with incomplete coverage', '');
              lines.push('| File | Stmts | Branch | Funcs | Lines |');
              lines.push('|------|------:|-------:|------:|------:|');
              for (const f of incomplete) {
                const cell = (d) => `${icon(d.pct)} ${d.pct.toFixed(0)}%`;
                lines.push(`| \`${f.file}\` | ${cell(f.statements)} | ${cell(f.branches)} | ${cell(f.functions)} | ${cell(f.lines)} |`);
              }
            }

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 Test Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  check-deps:
    name: 'Check deps deduplication'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout source code'
        uses: 'actions/checkout@v6'
      - name: 'Prepare workflow'
        uses: ./.github/actions/prepare
      - name: 'Deduplicate dependencies'
        uses: ./.github/actions/deduplicate
        with:
          strategy: 'highest'
      - name: 'Verify yarn.lock is intact'
        run: git diff --exit-code yarn.lock
