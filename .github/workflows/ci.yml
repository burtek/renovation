name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

  coverage-current:
    name: Coverage (current)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests with coverage
        run: yarn test:coverage --reporter=verbose --coverage.reporter=text --coverage.reporter=json-summary

      - name: Upload current coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-current
          path: coverage/coverage-summary.json
          if-no-files-found: error

  coverage-base:
    name: Coverage (base)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --silent

      - name: Run tests with coverage (base)
        run: yarn test:coverage --coverage.reporter=json-summary || true

      - name: Upload base coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-base
          path: coverage/coverage-summary.json
          if-no-files-found: warn

  coverage-check:
    name: Coverage (check thresholds)
    runs-on: ubuntu-latest
    needs: [coverage-current]

    permissions:
      contents: read

    steps:
      - name: Download current coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-current
          path: coverage-current

      - name: Check coverage thresholds
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const currentPath = path.join(process.env.GITHUB_WORKSPACE, 'coverage-current', 'coverage-summary.json');
            const current = JSON.parse(fs.readFileSync(currentPath, 'utf8'));

            const THRESHOLD = 95;
            const metrics = ['statements', 'branches', 'functions', 'lines'];
            const failures = metrics.filter(key => current.total[key].pct < THRESHOLD);

            if (failures.length > 0) {
              core.setFailed(`Coverage below ${THRESHOLD}% threshold for: ${failures.map(k => `${k} (${current.total[k].pct.toFixed(1)}%)`).join(', ')}`);
            }

  coverage-compare:
    name: Coverage (compare)
    runs-on: ubuntu-latest
    needs: [coverage-current, coverage-base]

    permissions:
      contents: read
      pull-requests: write

    # Skip on fork PRs — they don't have write access for PR comments
    if: ${{ !github.event.pull_request.head.repo.fork }}

    steps:
      - name: Download current coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-current
          path: coverage-current

      - name: Download base coverage summary
        uses: actions/download-artifact@v4
        with:
          name: coverage-base
          path: coverage-base

      - name: Fail on coverage regression
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const currentPath = path.join(process.env.GITHUB_WORKSPACE, 'coverage-current', 'coverage-summary.json');
            if (!fs.existsSync(currentPath)) {
              console.log('No coverage summary found, skipping regression check.');
              return;
            }

            const basePath = path.join(process.env.GITHUB_WORKSPACE, 'coverage-base', 'coverage-summary.json');
            if (!fs.existsSync(basePath)) {
              console.log('No base coverage found, skipping regression check.');
              return;
            }

            const current = JSON.parse(fs.readFileSync(currentPath, 'utf8'));
            const base = JSON.parse(fs.readFileSync(basePath, 'utf8'));

            const metrics = ['statements', 'branches', 'functions', 'lines'];
            const regressions = metrics.filter(key => current.total[key].pct - base.total[key].pct < 0);

            if (regressions.length > 0) {
              core.setFailed(`Coverage decreased in: ${regressions.join(', ')}`);
            }

      - name: Post coverage comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const currentPath = path.join(process.env.GITHUB_WORKSPACE, 'coverage-current', 'coverage-summary.json');
            if (!fs.existsSync(currentPath)) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }

            const current = JSON.parse(fs.readFileSync(currentPath, 'utf8'));

            const basePath = path.join(process.env.GITHUB_WORKSPACE, 'coverage-base', 'coverage-summary.json');
            const base = fs.existsSync(basePath) ? JSON.parse(fs.readFileSync(basePath, 'utf8')) : null;

            const icon = p => p >= 90 ? '🟢' : p >= 70 ? '🟡' : '🔴';
            const fmtPct = (d) => `${icon(d.pct)} ${d.pct.toFixed(1)}%`;
            const delta = (cur, bas) => {
              if (!bas) return '';
              const d = cur.pct - bas.pct;
              if (Math.abs(d) < 0.05) return '±0.0%';
              return (d > 0 ? '+' : '') + d.toFixed(1) + '%';
            };

            const row = (label, key) => {
              const c = current.total[key];
              const b = base ? base.total[key] : null;
              const basCol = b ? ` ${fmtPct(b)} |` : '';
              const deltaCol = b ? ` ${delta(c, b)} |` : '';
              return `| ${label} |${basCol} ${fmtPct(c)} |${deltaCol} ${c.covered}/${c.total} |`;
            };

            const headerBase = base ? ' Base |' : '';
            const sepBase = base ? '-------|' : '';
            const headerDelta = base ? ' Δ |' : '';
            const sepDelta = base ? '----|' : '';

            const lines = [
              '## 🧪 Test Coverage Report',
              '',
              `| Metric |${headerBase} Current |${headerDelta} Covered |`,
              `|--------|${sepBase}---------|${sepDelta}---------|`,
              row('Statements', 'statements'),
              row('Branches', 'branches'),
              row('Functions', 'functions'),
              row('Lines', 'lines'),
            ];

            if (!base) {
              lines.push('', `_ℹ️ Base branch coverage not available — no comparison data could be generated for \`${context.payload.pull_request?.base?.ref ?? 'base branch'}\`._`);
            }

            // Files with incomplete coverage
            const incomplete = Object.entries(current)
              .filter(([file]) => file !== 'total')
              .map(([file, data]) => ({
                file: file.replace(process.env.GITHUB_WORKSPACE + '/', ''),
                ...data,
              }))
              .filter(f => f.statements.pct < 100 || f.branches.pct < 100 || f.functions.pct < 100 || f.lines.pct < 100)
              .sort((a, b) => a.statements.pct - b.statements.pct);

            if (incomplete.length > 0) {
              lines.push('', '### 📋 Files with incomplete coverage', '');
              lines.push('| File | Stmts | Branch | Funcs | Lines |');
              lines.push('|------|------:|-------:|------:|------:|');
              for (const f of incomplete) {
                const cell = (d) => `${icon(d.pct)} ${d.pct.toFixed(0)}%`;
                lines.push(`| \`${f.file}\` | ${cell(f.statements)} | ${cell(f.branches)} | ${cell(f.functions)} | ${cell(f.lines)} |`);
              }
            }

            const body = lines.join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🧪 Test Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  check-deps:
    name: 'Check deps deduplication'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        
      - name: 'Deduplicate dependencies'
        uses: ./.github/actions/deduplicate
        with:
          strategy: 'highest'

      - name: 'Verify yarn.lock is intact'
        run: git diff --exit-code yarn.lock
